<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a0d12"/>
      <stop offset=".45" stop-color="#2b1210"/>
      <stop offset=".75" stop-color="#4a1d10"/>
      <stop offset="1" stop-color="#200c08"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".92" r=".75">
      <stop offset="0" stop-color="#ff7b2e" stop-opacity=".85"/>
      <stop offset=".35" stop-color="#e0481c" stop-opacity=".45"/>
      <stop offset="1" stop-color="#e0481c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rock1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1a12"/><stop offset="1" stop-color="#170a07"/>
    </linearGradient>
    <linearGradient id="rock2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a120c"/><stop offset="1" stop-color="#120705"/>
    </linearGradient>
    <linearGradient id="lava" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9a3c"/><stop offset=".5" stop-color="#ff5e1f"/><stop offset="1" stop-color="#ff9a3c"/>
    </linearGradient>
  </defs>
  <rect width="960" height="520" fill="url(#sky)"/>
  <ellipse cx="480" cy="480" rx="620" ry="270" fill="url(#glow)"/>
  <!-- montanhas distantes -->
  <path d="M0 250 L120 150 L210 240 L330 120 L430 250 L560 140 L680 260 L800 160 L960 250 L960 520 L0 520 Z" fill="url(#rock2)" opacity=".85"/>
  <!-- crateras médias -->
  <path d="M-20 340 L140 220 L260 330 L400 210 L540 340 L700 230 L850 330 L980 250 L980 520 L-20 520 Z" fill="url(#rock1)"/>
  <!-- fissuras de lava -->
  <path d="M180 520 L210 430 L230 445 L250 380 L262 392 L285 330" stroke="url(#lava)" stroke-width="7" fill="none" stroke-linecap="round" opacity=".9"/>
  <path d="M690 520 L672 440 L695 452 L710 395 L728 410 L740 360" stroke="url(#lava)" stroke-width="6" fill="none" stroke-linecap="round" opacity=".8"/>
  <path d="M430 520 L455 460 L470 472 L488 420" stroke="url(#lava)" stroke-width="5" fill="none" stroke-linecap="round" opacity=".7"/>
  <!-- chão -->
  <path d="M0 470 Q240 430 480 462 Q720 494 960 456 L960 520 L0 520 Z" fill="#150806"/>
  <path d="M0 480 Q240 445 480 472 Q720 500 960 468 L960 520 L0 520 Z" fill="#0e0504"/>
  <!-- brasas flutuando -->
  <g fill="#ffb35c">
    <circle cx="150" cy="300" r="3" opacity=".9"/><circle cx="320" cy="240" r="2" opacity=".7"/>
    <circle cx="520" cy="330" r="2.5" opacity=".8"/><circle cx="700" cy="270" r="2" opacity=".6"/>
    <circle cx="840" cy="330" r="3" opacity=".85"/><circle cx="420" cy="180" r="1.6" opacity=".5"/>
    <circle cx="600" cy="150" r="1.8" opacity=".45"/><circle cx="240" cy="380" r="2.2" opacity=".75"/>
    <circle cx="770" cy="190" r="1.5" opacity=".4"/><circle cx="90" cy="210" r="1.8" opacity=".5"/>
  </g>
  <!-- fumaça -->
  <ellipse cx="300" cy="130" rx="180" ry="46" fill="#1c0d0a" opacity=".55"/>
  <ellipse cx="700" cy="90" rx="220" ry="52" fill="#180b08" opacity=".5"/>
</svg>
