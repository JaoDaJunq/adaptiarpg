      <stop offset=".55" stop-color="#b9cdd9" stop-opacity=".35"/>
      <stop offset="1" stop-color="#b9cdd9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
