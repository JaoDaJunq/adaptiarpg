      <stop offset=".5" stop-color="#8fa8b5" stop-opacity=".22"/>
      <stop offset="1" stop-color="#8fa8b5" stop-opacity=".05"/>
    </linearGradient>
  </defs>
  <rect width="960" height="520" fill="url(#sky)"/>
